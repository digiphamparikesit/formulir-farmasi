<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Pengajuan Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --green-900:#0B3D2A;
    --green-800:#0F4D34;
    --green-700:#146C43;
    --green-600:#1E8455;
    --green-500:#2F9E63;
    --green-100:#E3F1E8;
    --green-050:#F2F7F3;
    --paper:#F6F7F2;
    --ink:#16241C;
    --muted:#5C6B61;
    --border:#D7E3D9;
    --danger:#B3261E;
    --danger-bg:#FBEAE9;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    line-height:1.5;
    padding:40px 16px 80px;
  }
  .wrap{max-width:640px;margin:0 auto;}
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:28px;
  }
  .brand svg{flex-shrink:0;}
  .brand h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:22px;
    margin:0;
    color:var(--green-900);
    letter-spacing:-0.01em;
  }
  .brand p{
    margin:2px 0 0;
    font-size:13px;
    color:var(--muted);
  }
  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:16px;
    padding:28px;
    margin-bottom:20px;
  }
  .section-label{
    font-size:11px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--green-700);
    margin:0 0 14px;
  }
  .field{margin-bottom:16px;}
  .field:last-child{margin-bottom:0;}
  label{
    display:block;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    margin-bottom:6px;
  }
  label .opt{color:var(--muted);font-weight:400;}
  input[type=text], input[type=date], input[type=time], textarea, select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    background:#fff;
    transition:border-color .15s;
  }
  input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:var(--green-600);
    box-shadow:0 0 0 3px var(--green-100);
  }
  textarea{resize:vertical;min-height:80px;}
  .nip-row{display:flex;gap:8px;}
  .nip-row input{font-family:'IBM Plex Mono',monospace;}
  .btn-check{
    flex-shrink:0;
    background:var(--green-700);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:0 18px;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:background .15s;
  }
  .btn-check:hover{background:var(--green-800);}
  .btn-check:disabled{background:var(--border);cursor:not-allowed;}
  .staff-preview{
    margin-top:12px;
    padding:12px 14px;
    background:var(--green-050);
    border:1px solid var(--green-100);
    border-radius:8px;
    font-size:13px;
    display:none;
  }
  .staff-preview.show{display:block;}
  .staff-preview div{margin-bottom:2px;}
  .staff-preview strong{color:var(--green-900);}
  .staff-preview.error{
    background:var(--danger-bg);
    border-color:#F3C7C4;
    color:var(--danger);
  }
  .chips{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(130px,1fr));
    gap:8px;
  }
  .chip{
    display:flex;
    align-items:center;
    gap:8px;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#fff;
    cursor:pointer;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    transition:border-color .15s, background .15s, color .15s;
  }
  .chip svg{flex-shrink:0;stroke:var(--muted);transition:stroke .15s;}
  .chip:hover{border-color:var(--green-500);}
  .chip.active{
    background:var(--green-700);
    border-color:var(--green-700);
    color:#fff;
  }
  .chip.active svg{stroke:#fff;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .radio-group{display:flex;gap:16px;padding-top:2px;}
  .radio-opt{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;}
  .radio-opt input{width:auto;}
  .submit-btn{
    width:100%;
    padding:14px;
    background:var(--green-700);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    transition:background .15s;
  }
  .submit-btn:hover{background:var(--green-800);}
  .submit-btn:disabled{background:var(--border);cursor:not-allowed;}
  .banner{
    padding:12px 14px;
    border-radius:8px;
    font-size:13px;
    margin-top:14px;
    display:none;
  }
  .banner.show{display:block;}
  .banner.success{background:var(--green-100);color:var(--green-900);border:1px solid var(--green-500);}
  .banner.error{background:var(--danger-bg);color:var(--danger);border:1px solid #F3C7C4;}
  .empty-hint{font-size:13px;color:var(--muted);padding:8px 0;}
  @media (max-width:480px){
    .row2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <circle cx="17" cy="17" r="17" fill="#0F4D34"/>
      <path d="M10 20c0-6 4-10 10-10 0 6-4 10-10 10z" fill="#2F9E63"/>
      <path d="M10 20V24" stroke="#E3F1E8" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div>
      <h1>Portal pengajuan staff</h1>
      <p>Ajukan izin, sakit, tukar shift, cuti, atau keterlambatan</p>
    </div>
  </div>

  <form id="mainForm">

    <div class="card">
      <p class="section-label">Identitas staff</p>
      <div class="field">
        <label for="nip">NIP</label>
        <div class="nip-row">
          <input type="text" id="nip" name="nip" placeholder="Masukkan NIP" required>
          <button type="button" class="btn-check" id="checkNip">Cari data</button>
        </div>
        <div class="staff-preview" id="staffPreview"></div>
      </div>
    </div>

    <div class="card">
      <p class="section-label">Jenis formulir</p>
      <div class="chips" id="jenisChips">
        <div class="chip" data-jenis="izin">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/></svg>
          Izin
        </div>
        <div class="chip" data-jenis="sakit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 12 6a5.5 5.5 0 0 0-10 2.5C2 12 9 18 12 20c1-.6 2-1.4 3-2.2"/></svg>
          Sakit
        </div>
        <div class="chip" data-jenis="tukarshift">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Tukar shift
        </div>
        <div class="chip" data-jenis="cuti">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Cuti tahunan
        </div>
        <div class="chip" data-jenis="telat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          Telat/pulang cepat
        </div>
      </div>
    </div>

    <div class="card" id="dynamicCard" style="display:none;">
      <p class="section-label" id="dynamicLabel">Detail pengajuan</p>
      <div id="dynamicFields"></div>
    </div>

    <div class="card" style="display:none;" id="emptyCard">
      <p class="empty-hint">Pilih jenis formulir di atas untuk melanjutkan.</p>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Kirim pengajuan</button>
    <div class="banner" id="banner"></div>
  </form>

</div>

<script>
// ==== KONFIGURASI ====
// Ganti dengan URL Web App Google Apps Script yang sudah di-deploy
const APPS_SCRIPT_URL = "GANTI_DENGAN_URL_WEB_APP_ANDA";

// ==== DEFINISI FIELD PER JENIS FORMULIR ====
const formConfigs = {
  izin: {
    label: "Detail izin",
    fields: [
      { id: "tanggalMulai", label: "Tanggal mulai", type: "date", required: true },
      { id: "tanggalSelesai", label: "Tanggal selesai", type: "date", required: true },
      { id: "keterangan", label: "Alasan izin", type: "textarea", required: true }
    ]
  },
  sakit: {
    label: "Detail sakit",
    fields: [
      { id: "tanggalMulai", label: "Tanggal mulai", type: "date", required: true },
      { id: "tanggalSelesai", label: "Tanggal selesai", type: "date", required: true },
      { id: "keterangan", label: "Keterangan (opsional lampiran surat dokter)", type: "textarea", required: false }
    ]
  },
  tukarshift: {
    label: "Detail tukar shift",
    fields: [
      { id: "tanggalShiftAsal", label: "Tanggal shift asal", type: "date", required: true },
      { id: "jamShiftAsal", label: "Jam shift asal", type: "time", required: true },
      { id: "nipRekan", label: "NIP rekan pengganti", type: "nip-lookup", required: true },
      { id: "tanggalShiftPengganti", label: "Tanggal shift pengganti", type: "date", required: true },
      { id: "jamShiftPengganti", label: "Jam shift pengganti", type: "time", required: true },
      { id: "keterangan", label: "Keterangan", type: "textarea", required: false }
    ]
  },
  cuti: {
    label: "Detail cuti tahunan",
    fields: [
      { id: "tanggalMulai", label: "Tanggal mulai", type: "date", required: true },
      { id: "tanggalSelesai", label: "Tanggal selesai", type: "date", required: true },
      { id: "keterangan", label: "Keterangan", type: "textarea", required: false }
    ]
  },
  telat: {
    label: "Detail telat / pulang cepat",
    fields: [
      { id: "tanggal", label: "Tanggal", type: "date", required: true },
      { id: "jenisTelat", label: "Jenis", type: "radio", options: [["telat","Telat"],["pulang_cepat","Pulang cepat"]], required: true },
      { id: "jam", label: "Jam", type: "time", required: true },
      { id: "keterangan", label: "Alasan", type: "textarea", required: true }
    ]
  }
};

let currentJenis = null;
let staffData = null;

// ==== PILIH JENIS FORMULIR ====
document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    currentJenis = chip.dataset.jenis;
    renderDynamicFields(currentJenis);
  });
});

function renderDynamicFields(jenis){
  const config = formConfigs[jenis];
  const card = document.getElementById("dynamicCard");
  const container = document.getElementById("dynamicFields");
  document.getElementById("dynamicLabel").textContent = config.label;
  document.getElementById("emptyCard").style.display = "none";
  card.style.display = "block";
  container.innerHTML = "";

  config.fields.forEach(f => {
    const wrap = document.createElement("div");
    wrap.className = "field";

    if (f.type === "textarea"){
      wrap.innerHTML = `
        <label for="${f.id}">${f.label}${f.required ? "" : ' <span class="opt">(opsional)</span>'}</label>
        <textarea id="${f.id}" name="${f.id}" ${f.required ? "required" : ""}></textarea>`;
    } else if (f.type === "radio"){
      wrap.innerHTML = `
        <label>${f.label}</label>
        <div class="radio-group">
          ${f.options.map((o,i) => `
            <label class="radio-opt">
              <input type="radio" name="${f.id}" value="${o[0]}" ${i===0 ? "checked" : ""}>
              ${o[1]}
            </label>`).join("")}
        </div>`;
    } else if (f.type === "nip-lookup"){
      wrap.innerHTML = `
        <label for="${f.id}">${f.label}</label>
        <div class="nip-row">
          <input type="text" id="${f.id}" name="${f.id}" placeholder="NIP rekan" required>
          <button type="button" class="btn-check" data-lookup="${f.id}">Cari data</button>
        </div>
        <div class="staff-preview" id="${f.id}Preview"></div>`;
    } else {
      wrap.innerHTML = `
        <label for="${f.id}">${f.label}${f.required ? "" : ' <span class="opt">(opsional)</span>'}</label>
        <input type="${f.type}" id="${f.id}" name="${f.id}" ${f.required ? "required" : ""}>`;
    }
    container.appendChild(wrap);
  });

  container.querySelectorAll("[data-lookup]").forEach(btn => {
    btn.addEventListener("click", () => {
      const fieldId = btn.dataset.lookup;
      const nip = document.getElementById(fieldId).value.trim();
      lookupStaff(nip, document.getElementById(fieldId + "Preview"));
    });
  });
}

// ==== AUTOFILL DATA STAFF ====
document.getElementById("checkNip").addEventListener("click", () => {
  const nip = document.getElementById("nip").value.trim();
  lookupStaff(nip, document.getElementById("staffPreview"), true);
});

async function lookupStaff(nip, previewEl, isMainStaff){
  if (!nip){
    showPreview(previewEl, "Masukkan NIP terlebih dahulu.", true);
    return;
  }
  showPreview(previewEl, "Mencari data...", false);

  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getStaff&nip=${encodeURIComponent(nip)}`);
    const data = await res.json();

    if (data.error || !data.nama){
      showPreview(previewEl, "NIP tidak ditemukan. Periksa kembali.", true);
      if (isMainStaff) staffData = null;
      return;
    }

    previewEl.innerHTML = `
      <div><strong>${data.nama}</strong></div>
      <div>${data.departemen || "-"} &middot; ${data.jabatan || "-"}</div>`;
    previewEl.className = "staff-preview show";

    if (isMainStaff) staffData = data;
  } catch (err){
    showPreview(previewEl, "Gagal menghubungi server. Coba lagi.", true);
  }
}

function showPreview(el, text, isError){
  el.textContent = text;
  el.className = "staff-preview show" + (isError ? " error" : "");
}

// ==== SUBMIT FORM ====
document.getElementById("mainForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const banner = document.getElementById("banner");
  banner.className = "banner";

  if (!currentJenis){
    banner.textContent = "Pilih jenis formulir terlebih dahulu.";
    banner.classList.add("banner","error","show");
    return;
  }
  if (!staffData){
    banner.textContent = "Data staff belum ditemukan. Cari data NIP terlebih dahulu.";
    banner.classList.add("banner","error","show");
    return;
  }

  const formData = new FormData(e.target);
  const payload = { jenis: currentJenis };
  formData.forEach((value, key) => { payload[key] = value; });

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Mengirim...";

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    banner.textContent = "Pengajuan berhasil dikirim.";
    banner.classList.add("banner","success","show");
    e.target.reset();
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    document.getElementById("dynamicCard").style.display = "none";
    document.getElementById("staffPreview").className = "staff-preview";
    currentJenis = null;
    staffData = null;
  } catch (err){
    banner.textContent = "Gagal mengirim pengajuan. Periksa koneksi dan coba lagi.";
    banner.classList.add("banner","error","show");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Kirim pengajuan";
  }
});
</script>
</body>
</html>
